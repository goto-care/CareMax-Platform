<!DOCTYPE html>
<html lang="ja">

<head>
    <link rel="icon" type="image/png" href="/favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自助具管理 | CareMax Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="../auth.js"></script>
    <style>
        :root {
            --accent-primary: #f59e0b;
            --accent-secondary: #ef4444;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --glass-bg: rgba(255, 255, 255, 0.9);
            --glass-border: rgba(255, 255, 255, 0.5);
            --radius-xl: 24px;
            --radius-lg: 16px;
            --radius-md: 12px;
            --status-waiting: #fbbf24;
            --status-lending: #3b82f6;
            --status-returned: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', 'Outfit', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 50%, #fcd34d 100%);
            color: var(--text-main);
        }

        .app-container {
            display: grid;
            grid-template-columns: 260px 1fr;
            min-height: 100vh;
        }

        .sidebar {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 40px;
            text-decoration: none;
            color: var(--text-main);
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.3rem;
        }

        .logo-text {
            font-size: 1.2rem;
            font-weight: 800;
        }

        .filter-section {
            margin-bottom: 24px;
        }

        .filter-label {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .filter-btn {
            display: block;
            width: 100%;
            padding: 12px 16px;
            background: transparent;
            border: none;
            border-radius: var(--radius-md);
            text-align: left;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .filter-btn:hover {
            background: rgba(0, 0, 0, 0.05);
        }

        .filter-btn.active {
            background: white;
            color: var(--accent-primary);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 10px;
        }

        .dot-waiting {
            background: var(--status-waiting);
        }

        .dot-lending {
            background: var(--status-lending);
        }

        .dot-returned {
            background: var(--status-returned);
        }

        .main-content {
            padding: 40px;
            overflow-y: auto;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }

        .page-title {
            font-size: 2rem;
            font-weight: 800;
        }

        .btn-group {
            display: flex;
            gap: 12px;
        }

        .add-btn {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: var(--radius-md);
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }

        .add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(245, 158, 11, 0.3);
        }

        .export-btn {
            background: white;
            border: 1px solid #e2e8f0;
            padding: 12px 20px;
            border-radius: var(--radius-md);
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            transition: 0.2s;
        }

        .export-btn:hover {
            border-color: var(--accent-primary);
            color: var(--accent-primary);
        }

        .table-container {
            background: white;
            border-radius: var(--radius-xl);
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1200px;
        }

        th,
        td {
            padding: 12px 10px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
            font-size: 0.85rem;
            white-space: nowrap;
        }

        th {
            font-weight: 700;
            color: var(--text-muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            background: #f8fafc;
            position: sticky;
            top: 0;
        }

        tr:hover {
            background: #fffbeb;
        }

        .status-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .badge-waiting {
            background: #fef3c7;
            color: #92400e;
        }

        .badge-lending {
            background: #dbeafe;
            color: #1e40af;
        }

        .badge-returned {
            background: #d1fae5;
            color: #065f46;
        }

        .action-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 6px;
            border-radius: 6px;
            transition: 0.2s;
        }

        .action-btn:hover {
            background: #f1f5f9;
            color: var(--text-main);
        }

        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal.hidden {
            display: none;
        }

        .modal-content {
            background: white;
            border-radius: var(--radius-xl);
            padding: 32px;
            width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .modal-header h2 {
            font-size: 1.4rem;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-muted);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group.full {
            grid-column: 1 / -1;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #e2e8f0;
            border-radius: var(--radius-md);
            font-size: 0.95rem;
            transition: 0.2s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid #e2e8f0;
        }

        .btn-cancel {
            background: #f1f5f9;
            color: var(--text-muted);
            border: none;
            padding: 12px 24px;
            border-radius: var(--radius-md);
            font-weight: 600;
            cursor: pointer;
        }

        .btn-save {
            background: var(--accent-primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: var(--radius-md);
            font-weight: 600;
            cursor: pointer;
        }

        .btn-delete {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 0.9rem;
            margin-right: auto;
        }

        /* Row click to edit */
        tr.clickable-row {
            cursor: pointer;
        }

        tr.clickable-row:hover {
            background: #fef3c7;
        }

        /* Completed row (has lastCheck date) */
        tr.completed-row {
            background: rgba(148, 163, 184, 0.15) !important;
            color: rgba(30, 41, 59, 0.6);
        }

        tr.completed-row td {
            position: relative;
        }

        tr.completed-row::after {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            top: 0;
            bottom: 0;
            background: repeating-linear-gradient(45deg,
                    transparent,
                    transparent 10px,
                    rgba(148, 163, 184, 0.1) 10px,
                    rgba(148, 163, 184, 0.1) 20px);
            pointer-events: none;
        }

        /* Notification toast */
        .ship-notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            padding: 16px 24px;
            border-radius: var(--radius-lg);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
            z-index: 2000;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .ship-notification.hidden {
            display: none;
        }

        .ship-notification button {
            background: white;
            color: var(--accent-primary);
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <aside class="sidebar">
            <a href="../index.html" class="logo-section">
                <div class="logo-icon"><i class="fa-solid fa-wheelchair"></i></div>
                <span class="logo-text">自助具管理</span>
            </a>

            <div class="filter-section">
                <div class="filter-label">状況フィルタ</div>
                <button class="filter-btn active" onclick="setFilter('')" id="filter-all">
                    <i class="fa-solid fa-list"></i> 全て表示
                </button>
                <button class="filter-btn" onclick="setFilter('発送待')" id="filter-waiting">
                    <span class="status-dot dot-waiting"></span>発送待
                </button>
                <button class="filter-btn" onclick="setFilter('貸出中')" id="filter-lending">
                    <span class="status-dot dot-lending"></span>貸出中
                </button>
                <button class="filter-btn" onclick="setFilter('返却済')" id="filter-returned">
                    <span class="status-dot dot-returned"></span>返却済
                </button>
            </div>

            <div class="filter-section">
                <div class="filter-label">セット名</div>
                <button class="filter-btn" onclick="setSetFilter('')" id="set-all">全てのセット</button>
                <button class="filter-btn" onclick="setSetFilter('X')" id="set-x">セット X</button>
                <button class="filter-btn" onclick="setSetFilter('Y')" id="set-y">セット Y</button>
                <button class="filter-btn" onclick="setSetFilter('Z')" id="set-z">セット Z</button>
            </div>
        </aside>

        <main class="main-content">
            <div class="top-bar">
                <h1 class="page-title">自助具管理</h1>
                <div class="btn-group">
                    <button class="export-btn" onclick="exportCSV()">
                        <i class="fa-solid fa-download"></i> CSV出力
                    </button>
                    <button class="add-btn" onclick="openModal()">
                        <i class="fa-solid fa-plus"></i> 新規登録
                    </button>
                </div>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>No.</th>
                            <th>得意先コード</th>
                            <th>得意先名</th>
                            <th>状況</th>
                            <th>セット名</th>
                            <th>対応担当</th>
                            <th>営業担当</th>
                            <th>依頼日</th>
                            <th>使用日</th>
                            <th>発送日</th>
                            <th>返却予定日</th>
                            <th>返却日</th>
                            <th>最終チェック日</th>
                            <th>備考</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="records-table"></tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Add/Edit Modal -->
    <div id="record-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">新規登録</h2>
                <button class="close-btn" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="form-grid">
                <div class="form-group">
                    <label>管理番号</label>
                    <input type="text" id="f-management-no" readonly style="background: #f1f5f9; cursor: not-allowed;">
                </div>
                <div class="form-group">
                    <label>得意先コード</label>
                    <input type="text" id="f-customer-code" placeholder="例: C001">
                </div>
                <div class="form-group">
                    <label>得意先名</label>
                    <input type="text" id="f-customer-name" placeholder="例: 株式会社ABC">
                </div>
                <div class="form-group">
                    <label>状況</label>
                    <select id="f-status">
                        <option value="発送待">発送待</option>
                        <option value="貸出中">貸出中</option>
                        <option value="返却済">返却済</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>セット名</label>
                    <select id="f-set-name">
                        <option value="X">X</option>
                        <option value="Y">Y</option>
                        <option value="Z">Z</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>対応担当</label>
                    <input type="text" id="f-support-staff" placeholder="例: 田中">
                </div>
                <div class="form-group">
                    <label>営業担当</label>
                    <input type="text" id="f-sales-staff" placeholder="例: 佐藤">
                </div>
                <div class="form-group">
                    <label>依頼日</label>
                    <input type="date" id="f-request-date">
                </div>
                <div class="form-group">
                    <label>使用日</label>
                    <input type="date" id="f-usage-date">
                </div>
                <div class="form-group">
                    <label>発送日</label>
                    <input type="date" id="f-ship-date">
                </div>
                <div class="form-group">
                    <label>返却予定日</label>
                    <input type="date" id="f-expected-return">
                </div>
                <div class="form-group">
                    <label>返却日</label>
                    <input type="date" id="f-return-date">
                </div>
                <div class="form-group">
                    <label>最終チェック日</label>
                    <input type="date" id="f-last-check">
                </div>
                <div class="form-group full">
                    <label>備考</label>
                    <textarea id="f-notes" placeholder="備考を入力..."></textarea>
                </div>
                <div class="form-group full">
                    <label>送付アドレス（Gmail限定）</label>
                    <input type="email" id="f-notify-email" placeholder="例: example@gmail.com"
                        pattern="[a-zA-Z0-9._%+-]+@gmail\.com$">
                    <small style="color: var(--text-muted); font-size: 0.75rem;">※発送日に通知を送信します（Gmailアドレスのみ）</small>
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn-delete hidden" id="delete-btn" onclick="deleteRecord()">
                    <i class="fa-solid fa-trash"></i> 削除
                </button>
                <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
                <button class="btn-save" onclick="saveRecord()">保存</button>
            </div>
        </div>
    </div>

    <script>if (typeof checkAuth === 'function') checkAuth();</script>
    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="app.js"></script>
</body>

</html>
